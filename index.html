def scaled_dot_product_attention(Q, K, V, mask=None):
    """
    Q: (batch, heads, seq, d_head)
    K: (batch, heads, seq, d_head)
    V: (batch, heads, seq, d_head)
    """
    d_k = Q.shape[-1]
    # 어텐션 점수: Q @ K^T / sqrt(d_k)
    scores = Q @ K.transpose(0, 1, 3, 2) / np.sqrt(d_k)
    
    if mask is not None:
        scores = scores + mask
    
    attn_weights = softmax(scores, axis=-1)
    output = attn_weights @ V
    return output, attn_weights

    """
    입력: 토큰 ID
    출력: 다음 토큰에 대한 로짓

def softmax(x, axis=-1):
    x = x - np.max(x, axis=axis, keepdims=True)
    return np.exp(x) / np.sum(np.exp(x), axis=axis, keepdims=True)

def layer_norm(x, eps=1e-5):
    mean = np.mean(x, axis=-1, keepdims=True)
    var = np.var(x, axis=-1, keepdims=True)
    return (x - mean) / np.sqrt(var + eps)

# ============================================================
# 어텐션 전용 트랜스포머 (함수 + 딕셔너리)
# class를 사용하지 않고 순수 함수만으로 구현

def sinusoidal_encoding(max_len, d_model):
    pe = np.zeros((max_len, d_model))
    pos = np.arange(max_len)[:, np.newaxis]
    div = np.exp(np.arange(0, d_model, 2) * (-np.log(10000.0) / d_model))
    pe[:, 0::2] = np.sin(pos * div)
    pe[:, 1::2] = np.cos(pos * div[:d_model//2])
    return pe

def create_model(vocab_size, d_model, n_heads, n_layers, max_seq_len):
    np.random.seed(42)
    scale = 0.02
    d_head = d_model // n_heads
        
    model = {
        'W_E': np.random.randn(vocab_size, d_model) * scale,
        'W_U': np.random.randn(d_model, vocab_size) * scale,
        'b_U': np.zeros(vocab_size),
        'pos_embed': sinusoidal_encoding(max_seq_len, d_model),
        'n_heads': n_heads, 'd_head': d_head,
        'layers': [],
    }
    for _ in range(n_layers):
        model['layers'].append({
            'W_Q': [np.random.randn(d_model, d_head) * scale for _ in range(n_heads)],
            'W_K': [np.random.randn(d_model, d_head) * scale for _ in range(n_heads)],
            'W_V': [np.random.randn(d_model, d_head) * scale for _ in range(n_heads)],
            'W_O': [np.random.randn(d_head, d_model) * scale for _ in range(n_heads)],
            'ln_w': np.ones(d_model), 'ln_b': np.zeros(d_model),
        })
    return model

def attention_head_fn(x, W_Q, W_K, W_V, W_O, d_head, mask):
    """단일 어텐션 헤드"""
    Q = x @ W_Q
    K = x @ W_K
    V = x @ W_V
    scores = Q @ K.T / np.sqrt(d_head) + mask
    attn_weights = softmax(scores)
    return (attn_weights @ V) @ W_O, attn_weights

def forward_pass(model, token_ids, return_attentions=False):
    """전방 패스"""
    seq_len = len(token_ids)
    mask = np.triu(np.full((seq_len, seq_len), -1e9), k=1)
    x = model['W_E'][token_ids] + model['pos_embed'][:seq_len]
    all_attentions = []
    
    for layer in model['layers']:
        x_norm = layer_norm(x) * layer['ln_w'] + layer['ln_b']
        layer_out = np.zeros_like(x)
        layer_attns = []
        for h in range(model['n_heads']):
            head_out, attn_w = attention_head_fn(
                x_norm, layer['W_Q'][h], layer['W_K'][h],
                layer['W_V'][h], layer['W_O'][h],
                model['d_head'], mask)
            layer_out += head_out
            layer_attns.append(attn_w)
        x = x + layer_out
        all_attentions.append(layer_attns)
    
    logits = layer_norm(x) @ model['W_U'] + model['b_U']
    return (logits, all_attentions) if return_attentions else logits

def count_params(m):
    total = m['W_E'].size + m['W_U'].size
    for layer in m['layers']:
        for h in range(m['n_heads']):
            total += sum(layer[k][h].size for k in ['W_Q','W_K','W_V','W_O'])
        total += layer['ln_w'].size + layer['ln_b'].size
    return total

# ============================================================
# 유틸리티 함수
# ============================================================
def softmax(x, axis=-1):
    x = x - np.max(x, axis=axis, keepdims=True)
    return np.exp(x) / np.sum(np.exp(x), axis=axis, keepdims=True)

def cross_entropy_loss(logits, targets):
    """크로스 엔트로피 손실"""
    probs = softmax(logits)
    n = len(targets)
    log_probs = np.log(probs[np.arange(n), targets] + 1e-9)
    return -np.mean(log_probs)

def cross_entropy_grad(logits, targets):
    """크로스 엔트로피 그래디언트"""
    probs = softmax(logits)
    n = len(targets)
    probs[np.arange(n), targets] -= 1
    return probs / n

# ============================================================
# Adam 옵티마이저
# ============================================================
# Adam 옵티마이저 (딕셔너리로 상태 관리)
def create_adam(lr=1e-3, beta1=0.9, beta2=0.999, eps=1e-8):
    """Adam 옵티마이저 상태 생성"""
    return {'lr': lr, 'beta1': beta1, 'beta2': beta2, 'eps': eps,
            't': 0, 'm': {}, 'v': {}}

def adam_step(opt, param_id, param, grad):
    """Adam 파라미터 업데이트"""
    opt['t'] += 1
    if param_id not in opt['m']:
        opt['m'][param_id] = np.zeros_like(param)
        opt['v'][param_id] = np.zeros_like(param)
    
    opt['m'][param_id] = opt['beta1'] * opt['m'][param_id] + (1 - opt['beta1']) * grad
    opt['v'][param_id] = opt['beta2'] * opt['v'][param_id] + (1 - opt['beta2']) * grad**2
    
    m_hat = opt['m'][param_id] / (1 - opt['beta1']**opt['t'])
    v_hat = opt['v'][param_id] / (1 - opt['beta2']**opt['t'])
    
    param -= opt['lr'] * m_hat / (np.sqrt(v_hat) + opt['eps'])
    return param

def generate_repeated_pattern(vocab_size, seq_len, n_samples):
    data = []
    for _ in range(n_samples):
        # 랜덤 패턴 선택하고 반복
        pattern = np.random.randint(0, vocab_size, size=seq_len//2)
        seq = np.tile(pattern, 2)  # 패턴을 2번 반복
        data.append(seq)
    return np.array(data)

# 전방 패스 함수
def forward_pass(seq):
    X = W_E[seq]
    mask = np.triu(np.full((len(seq), len(seq)), -1e9), k=1)
    Q = X @ W_Q
    K = X @ W_K
    V = X @ W_V
    A = softmax(Q @ K.T / np.sqrt(d_head) + mask)
    head_out = (A @ V) @ W_O
    x1 = X + head_out
    logits = x1 @ W_U
    return logits, A

              [0, 2]])

print(f"A = \\n{A}")
print(f"\\n고유값: {eigenvalues}")
print(f"고유벡터 (열로):\\n{eigenvectors}")

# 검증: A @ v = λ * v
for i in range(len(eigenvalues)):
    v = eigenvectors[:, i]
    lam = eigenvalues[i]
    Av = A @ v
    lam_v = lam * v
    print(f"\\n검증 (λ={lam:.2f}):")
    print(f"  A @ v = {np.round(Av, 4)}")
    print(f"  λ * v = {np.round(lam_v, 4)}")
    print(f"  같은가? {np.allclose(Av, lam_v)}")

**고유값 분해 vs SVD:**

4. **PCA와의 관계:** SVD = PCA의 핵심`,code:`import numpy as np

print("\\n1. SVD 기초: A = UΣV^T")
print("-" * 45)

A = np.array([[3, 2, 2],
              [2, 3, -2]])

U, S, Vt = np.linalg.svd(A)

print(f"A (2×3) = \\n{A}")
print(f"\\nU (좌특이벡터, 2×2) = \\n{np.round(U, 4)}")
print(f"\\nΣ (특이값) = {np.round(S, 4)}")
print(f"\\nV^T (우특이벡터, 3×3) = \\n{np.round(Vt, 4)}")

# 재구성 검증
Sigma_full = np.zeros((2, 3))
Sigma_full[:2, :2] = np.diag(S)
A_reconstructed = U @ Sigma_full @ Vt
print(f"\\n재구성 U @ Σ @ V^T = \\n{np.round(A_reconstructed, 4)}")
print(f"원래 A와 같은가? {np.allclose(A, A_reconstructed)}")

print(f"  σ₁ = {S[0]:.4f}  ← 가장 중요한 방향")
print(f"  σ₂ = {S[1]:.4f}  ← 두 번째 중요한 방향")

# 에너지 비율
total_energy = np.sum(S**2)
cumulative = np.cumsum(S**2) / total_energy * 100
print(f"\\n에너지 (σ²) 비율:")
for i, (s, cum) in enumerate(zip(S, cumulative)):
    bar = '█' * int(cum / 5)
    print(f"  σ_{i+1}²: {s**2:.2f} ({s**2/total_energy*100:.1f}%), 누적: {bar} {cum:.1f}%")

# 3. 저랭크 근사 (Low-Rank Approximation)
# ============================================================
print("\\n3. 저랭크 근사")
print("-" * 45)

# 더 큰 행렬
np.random.seed(42)
m, n = 10, 8
A_large = np.random.randn(m, n)

U, S, Vt = np.linalg.svd(A_large)

print(f"원래 행렬: {m}×{n}, 랭크 = {np.linalg.matrix_rank(A_large)}")
print(f"특이값: {np.round(S[:6], 3)}...")

# 랭크-k 근사
for k in [1, 2, 4, 8]:
    if k > min(m, n):
        continue
    # 랭크-k 근사: U[:,:k] @ diag(S[:k]) @ Vt[:k,:]
    A_k = U[:, :k] @ np.diag(S[:k]) @ Vt[:k, :]
    error = np.linalg.norm(A_large - A_k, 'fro')
    error_relative = error / np.linalg.norm(A_large, 'fro') * 100
    
    # 압축률
    original_params = m * n
    compressed_params = k * (m + n + 1)  # U(:,k) + S(k) + V(:,k)
    compression = (1 - compressed_params / original_params) * 100
    
    print(f"  랭크-{k}: 오류 = {error:.4f} ({error_relative:.1f}%), 압축률 = {compression:.1f}%")

**수식:**
LayerNorm(x) = γ · (x - μ) / √(σ² + ε) + β

def layer_norm(x, gamma=None, beta=None, eps=1e-5):
    mean = np.mean(x, axis=-1, keepdims=True)
    var = np.var(x, axis=-1, keepdims=True)
    x_norm = (x - mean) / np.sqrt(var + eps)
    if gamma is not None:
        x_norm = gamma * x_norm
    if beta is not None:
        x_norm = x_norm + beta
    return x_norm

def sinusoidal_encoding(max_len, d_model):
    pe = np.zeros((max_len, d_model))
    position = np.arange(max_len)[:, np.newaxis]
    div_term = np.exp(np.arange(0, d_model, 2) * (-np.log(10000.0) / d_model))
    pe[:, 0::2] = np.sin(position * div_term)
    pe[:, 1::2] = np.cos(position * div_term)
    return pe

print("-" * 45)

def apply_rope(x, pos, base=10000):
    d = len(x)
    theta = pos / (base ** (2 * np.arange(d // 2) / d))
    cos_t = np.cos(theta)
    sin_t = np.sin(theta)
    x_rot = np.zeros_like(x)
    for i in range(0, d, 2):
        x_rot[i] = x[i] * cos_t[i//2] - x[i+1] * sin_t[i//2]
        x_rot[i+1] = x[i] * sin_t[i//2] + x[i+1] * cos_t[i//2]
    return x_rot

def alibi_bias(seq_len, num_heads):
    slopes = 2 ** (-8 * np.arange(1, num_heads + 1) / num_heads)
    positions = np.arange(seq_len)
    distances = positions[:, None] - positions[None, :]
    biases = []
    for m in slopes:
        bias = -m * np.abs(distances)
        bias = np.where(distances > 0, -1e9, bias)
        biases.append(bias)
    return np.stack(biases)

def softmax_jacobian(s):
    n = len(s)
    J = np.zeros((n, n))
    for i in range(n):
        for j in range(n):
            if i == j:
                J[i, j] = s[i] * (1 - s[i])
            else:
                J[i, j] = -s[i] * s[j]
    return J

def clip_grad_norm(grads, max_norm):
    total_norm = np.sqrt(sum(np.sum(g**2) for g in grads))
    clip_coef = min(1.0, max_norm / (total_norm + 1e-6))
    clipped = [g * clip_coef for g in grads]
    print(f"  노름: {total_norm:.4f} → {total_norm * clip_coef:.4f} (max={max_norm})")
    return clipped

3. 원하는 어휘 크기에 도달하면 중단

**특징:**
- 빈번한 단어: 단일 토큰 (예: "the")
- 드문 단어: 여러 서브워드로 분해 (예: "un" + "comfort" + "able")

def get_pair_counts(tokens_list):
    """인접 토큰 쌍의 빈도 계산"""
    counts = {}
    for tokens in tokens_list:
        for i in range(len(tokens) - 1):
            pair = (tokens[i], tokens[i+1])
            counts[pair] = counts.get(pair, 0) + 1
    return counts

def merge_pair(tokens_list, pair, new_token):
    """가장 빈번한 쌍을 새 토큰으로 병합"""
    result = []
    for tokens in tokens_list:
        new_tokens = []
        i = 0
        while i < len(tokens):
            if i < len(tokens) - 1 and tokens[i] == pair[0] and tokens[i+1] == pair[1]:
                new_tokens.append(new_token)
                i += 2
            else:
                new_tokens.append(tokens[i])
                i += 1
        result.append(new_tokens)
    return result

def chinchilla_optimal(compute_budget):
    """
    Chinchilla: N과 D를 같은 비율로 스케일
    C ≈ 6 * N * D (대략적)
    최적: D ≈ 20 * N
    """
    # C = 6 * N * D, D = 20 * N
    # C = 6 * N * 20 * N = 120 * N^2
    N_opt = np.sqrt(compute_budget / 120)
    D_opt = 20 * N_opt
    return N_opt, D_opt

import struct

def float_to_bits(f):
    """FP32를 32비트 이진 문자열로 변환"""
    packed = struct.pack('>f', f)
    bits = ''.join(f'{b:08b}' for b in packed)
    return bits

def bits_to_components(bits):
    """32비트를 부호/지수/가수로 분해"""
    sign = int(bits[0])
    exponent_bits = bits[1:9]
    mantissa_bits = bits[9:32]
    exponent = int(exponent_bits, 2)
    # 가수: 1.mantissa (암묵적 1)
    mantissa = 1.0
    for i, b in enumerate(mantissa_bits):
        if b == '1':
            mantissa += 2 ** -(i + 1)
    return sign, exponent, exponent_bits, mantissa_bits, mantissa

    actual_exp = exp - 127

    print(f"    분해: {sign_str}1 × 2^({exp}-127) × {mantissa:.6f}")
    print(f"         = {sign_str}{mantissa:.6f} × 2^{actual_exp}")

    return e / e.sum(axis=axis, keepdims=True)

np.random.seed(42)

# 작은 크기로 설정
seq_len = 2
d_model = 4
d_head = 2

X = np.random.randn(seq_len, d_model) * 0.5
W_Q = np.random.randn(d_model, d_head) * 0.3
W_K = np.random.randn(d_model, d_head) * 0.3
W_V = np.random.randn(d_model, d_head) * 0.3
W_O = np.random.randn(d_head, d_model) * 0.3

# ============================================================
# 순전파 (Forward Pass)
# ============================================================
print("\\n--- 순전파 ---")
scale = np.sqrt(d_head)

Q = X @ W_Q;           print(f"1. Q = X @ W_Q:       shape {Q.shape}")
K = X @ W_K;           print(f"2. K = X @ W_K:       shape {K.shape}")
V = X @ W_V;           print(f"3. V = X @ W_V:       shape {V.shape}")
S = Q @ K.T / scale;   print(f"4. S = Q @ K^T / √d:  shape {S.shape}")

# 인과적 마스크
mask = np.triu(np.full((seq_len, seq_len), -1e9), k=1)
S_masked = S + mask

A = softmax(S_masked);  print(f"5. A = softmax(S):    shape {A.shape}")
O = A @ V;              print(f"6. O = A @ V:         shape {O.shape}")
Y = O @ W_O;            print(f"7. Y = O @ W_O:       shape {Y.shape}")

# 간단한 손실: L = sum(Y^2) / 2
L = np.sum(Y ** 2) / 2
print(f"\\n   Loss = ||Y||^2 / 2 = {L:.6f}")

# ============================================================
# 역전파 (Backward Pass)
# ============================================================
print("\\n--- 역전파 ---")

# 7. ∂L/∂Y = Y (MSE 미분)
dL_dY = Y.copy()
print(f"7. dL/dY = Y:         shape {dL_dY.shape}")

# dL/dW_O = O^T @ dL/dY
dL_dW_O = O.T @ dL_dY
print(f"   dL/dW_O:           shape {dL_dW_O.shape}")

# 6. dL/dO = dL/dY @ W_O^T
dL_dO = dL_dY @ W_O.T
print(f"6. dL/dO = dL/dY @ W_O^T:  shape {dL_dO.shape}")

dL_dA = dL_dO @ V.T
print(f"   dL/dA = dL/dO @ V^T:    shape {dL_dA.shape}")

dL_dV = A.T @ dL_dO
print(f"   dL/dV = A^T @ dL/dO:    shape {dL_dV.shape}")

# 5. 소프트맥스 역전파
# dL/dS[i,j] = sum_k dL/dA[i,k] * A[i,k] * (delta(j,k) - A[i,j])
# = A[i,j] * (dL/dA[i,j] - sum_k dL/dA[i,k] * A[i,k])
dL_dS = A * (dL_dA - np.sum(dL_dA * A, axis=-1, keepdims=True))

print(f"5. dL/dS (softmax grad): shape {dL_dS.shape}")

# 4. dL/dQ = dL/dS @ K / √d
dL_dQ = dL_dS @ K / scale
print(f"4. dL/dQ = dL/dS @ K / √d: shape {dL_dQ.shape}")

# dL/dK = dL/dS^T @ Q / √d
dL_dK = dL_dS.T @ Q / scale
print(f"   dL/dK = dL/dS^T @ Q / √d: shape {dL_dK.shape}")

# 1-3. 가중치 그래디언트
dL_dW_Q = X.T @ dL_dQ
dL_dW_K = X.T @ dL_dK
dL_dW_V = X.T @ dL_dV

print(f"1. dL/dW_Q:           shape {dL_dW_Q.shape}")
print(f"2. dL/dW_K:           shape {dL_dW_K.shape}")
print(f"3. dL/dW_V:           shape {dL_dW_V.shape}")

def compute_loss(W_Q_, W_K_, W_V_, W_O_):

    V_ = X @ W_V_

numerical_grad = (compute_loss(W_Q_plus, W_K, W_V, W_O) - compute_loss(W_Q_minus, W_K, W_V, W_O)) / (2 * eps)
analytical_grad = dL_dW_Q[0, 0]

print(f"  dL/dW_Q[0,0]:")
print(f"    해석적 그래디언트: {analytical_grad:.8f}")
print(f"    수치적 그래디언트: {numerical_grad:.8f}")

W_O_minus = W_O.copy(); W_O_minus[0, 0] -= eps
num_grad_O = (compute_loss(W_Q, W_K, W_V, W_O_plus) - compute_loss(W_Q, W_K, W_V, W_O_minus)) / (2 * eps)

print(f"\\n  dL/dW_O[0,0]:")

def naive_matmul(A, B):
    """순진한 3중 루프 행렬 곱"""
    M, K = A.shape
    K2, N = B.shape
    C = np.zeros((M, N), dtype=A.dtype)
    for i in range(M):
        for j in range(N):
            for k in range(K):
                C[i, j] += A[i, k] * B[k, j]
    return C

def tiled_matmul(A, B, tile_size=16):
    """타일링된 행렬 곱"""
    M, K = A.shape
    K2, N = B.shape
    C = np.zeros((M, N), dtype=A.dtype)
    
    for ii in range(0, M, tile_size):
        for jj in range(0, N, tile_size):
            for kk in range(0, K, tile_size):
                # 작은 타일끼리 곱 (캐시에 맞음)
                i_end = min(ii + tile_size, M)
                j_end = min(jj + tile_size, N)
                k_end = min(kk + tile_size, K)
                
                for i in range(ii, i_end):
                    for j in range(jj, j_end):
                        for k in range(kk, k_end):
                            C[i, j] += A[i, k] * B[k, j]
    return C

def count_parameters(vocab_size, d_model, n_layers, n_heads, d_ff,
                     max_seq=2048, tie_embeddings=True, use_swiglu=False,
                     use_bias=True):
    """트랜스포머 파라미터 수 정밀 계산"""
    params = {}
    
    # 토큰 임베딩
    params['token_embed'] = vocab_size * d_model
    
    # 위치 임베딩 (학습 가능한 경우)
    params['pos_embed'] = max_seq * d_model
    
    # 어텐션 레이어 (per layer)
    d_head = d_model // n_heads
    attn_per_layer = 4 * d_model * d_model  # W_Q, W_K, W_V, W_O
    if use_bias:
        attn_per_layer += 4 * d_model  # 바이어스
    params['attention'] = attn_per_layer * n_layers
    
    # MLP 레이어 (per layer)
    if use_swiglu:
        # SwiGLU: 3 행렬 (gate, up, down), d_ff = 2/3 * 4 * d_model
        mlp_per_layer = 3 * d_model * d_ff
    else:
        mlp_per_layer = 2 * d_model * d_ff  # up + down
    if use_bias:
        mlp_per_layer += d_ff + d_model
    params['mlp'] = mlp_per_layer * n_layers
    
    # 레이어 노름 (2 per layer + 1 final)
    ln_per_layer = 2 * 2 * d_model  # 2 norms × (gamma + beta)
    params['layer_norm'] = ln_per_layer * n_layers + 2 * d_model  # + final
    
    # 언임베딩
    if tie_embeddings:
        params['unembed'] = 0  # 임베딩과 공유
    else:
        params['unembed'] = d_model * vocab_size
    
    return params

def training_memory(n_params, batch_size, seq_len, d_model, n_layers,
                    precision='fp32'):
    """훈련 시 총 메모리 사용량 추정"""
    if precision == 'fp32':
        bytes_per_param = 4
    elif precision == 'fp16':
        bytes_per_param = 2
    elif precision == 'bf16':
        bytes_per_param = 2
    else:
        bytes_per_param = 4
    
    mem = {}
    
    # 모델 가중치
    mem['weights'] = n_params * bytes_per_param
    
    # 그래디언트
    mem['gradients'] = n_params * bytes_per_param
    
    # Adam 옵티마이저 상태 (m, v) — 항상 FP32
    mem['optimizer'] = n_params * 4 * 2  # m and v in FP32
    
    # FP32 마스터 가중치 (혼합 정밀도 시)
    if precision in ('fp16', 'bf16'):
        mem['master_weights'] = n_params * 4
    else:
        mem['master_weights'] = 0
    
    # 활성화값 (대략적 추정)
    # 각 레이어: ~10 * batch * seq * d_model * bytes
    mem['activations'] = 10 * batch_size * seq_len * d_model * bytes_per_param * n_layers
    
    return mem

for name, V, d, L, H, ff, seq, tie, swi, bias in models[:4]:  # GPT-2만

on",{onClick:()=>b(d.id),className:"th-btn-primary px-6 py-2.5 rounded-lg text-sm font-semibold transition-opacity hover:opacity-90",children:"Mark as Complete"})})]})}const wo=[{id:"introduction",title:"Introduction & Motivation",titleKr:"소개 및 동기",content:`Transformer language models are an emerging technology gaining increasingly broad real-world use in systems like GPT-3, LaMDA, Codex, Meena, and Gopher. However, as these models scale, their open-endedness creates an increasing scope for unexpected and sometimes harmful behaviors.

One avenue for addressing these issues is **mechanistic interpretability** — attempting to reverse engineer the detailed computations performed by transformers, similar to how a programmer might reverse engineer complicated binaries into human-readable source code.

We attempt to take initial steps towards reverse-engineering transformers by studying the simplest possible models first.`,contentKr:`트랜스포머 언어 모델은 GPT-3, LaMDA, Codex 등과 같은 시스템에서 점점 더 폭넓게 사용되고 있는 신기술입니다. 하지만 이러한 모델이 확장될수록, 예상치 못한 행동, 때로는 해로운 행동이 나타날 가능성도 함께 넓어집니다.

이 문제들을 해결할 수 있는 한 가지 방법은 **기계론적 해석성(Mechanistic Interpretability)**입니다. 이는 복잡한 이진 함수를 인간이 읽을 수 있는 소스 코드로 역설계하려는 것과 유사하게 트랜스포머가 수행하는 상세 계산을 역설계하려는 시도입니다.

우리는 가장 단순한 모델부터 시작해 트랜스포머를 역설계하는 초기 단계를 시도합니다.`,formulas:[]},{id:"zero-layer",title:"Zero-Layer Transformers: Bigram Statistics",titleKr:"0계층 트랜스포머: 바이그램 통계",content:`Zero-layer transformers model **bigram statistics**. The bigram table can be accessed directly from the weights without running the model.

The computation is simply:
**logits = W_U · W_E · x**

Where W_E is the embedding matrix and W_U is the unembedding matrix. Their product W_U · W_E forms a bigram table directly.

This is the simplest possible transformer — it only knows "what token tends to follow what token" in a statistical sense, with no understanding of longer-range dependencies.`,contentKr:`0계층 트랜스포머는 **바이그램 통계량**을 모델링합니다. 바이그램 테이블은 모델을 실행하지 않고도 가중치에서 직접 접근할 수 있습니다.

계산은 단순히:
**logits = W_U · W_E · x**

여기서 W_E는 임베딩 행렬, W_U는 언임베딩 행렬입니다. 이들의 곱 W_U · W_E가 직접 바이그램 테이블을 형성합니다.

이것은 가장 단순한 트랜스포머입니다 — 통계적 의미에서 "어떤 토큰 다음에 어떤 토큰이 오는가"만 알 뿐, 더 긴 범위의 의존성은 이해하지 못합니다.`,formulas:["logits = W_U \\cdot W_E \\cdot x","W_{bigram} = W_U W_E \\in \\mathbb{R}^{V \\times V}"]},{id:"one-layer",title:"One-Layer Attention: Skip-Trigrams",titleKr:"1계층 어텐션: 스킵-트라이그램",content:`One-layer attention-only transformers are an ensemble of **bigram and skip-trigram models**. 

A skip-trigram is a sequence of the form "A... B C" — the model can learn that when token A appears somewhere earlier, followed by token B, token C is likely to come next.

The key insight is that attention heads can be understood as having two independent computations:
- **QK circuit**: computes the attention pattern (which tokens attend to which)
- **OV circuit**: computes what information moves when attention is given

The expanded OV circuit W_U · W_OV · W_E directly gives the skip-trigram table, readable from weights without running the model.`,contentKr:`1계층 어텐션 전용 트랜스포머는 **바이그램과 스킵-트라이그램 모델들의 앙상블**입니다.

스킵-트라이그램은 "A... B C" 형태의 시퀀스입니다 — 모델은 토큰 A가 앞에 어딘가에 등장했을 때, 토큰 B 다음에 토큰 C가 올 가능성이 높다는 것을 학습할 수 있습니다.

핵심 통찰은 어텐션 헤드를 두 가지 독립적인 계산으로 이해할 수 있다는 것입니다:
- **QK 회로**: 어텐션 패턴 계산 (어떤 토큰이 어떤 토큰에 주목하는가)
- **OV 회로**: 어텐션이 주어졌을 때 어떤 정보가 이동하는지 계산

확장된 OV 회로 W_U · W_OV · W_E가 스킵-트라이그램 테이블을 직접 제공하며, 모델을 실행하지 않고도 가중치에서 읽을 수 있습니다.`,formulas:["W_{OV} = W_O W_V \\in \\mathbb{R}^{d_{model} \\times d_{model}}","W_{QK} = W_Q W_K^T \\in \\mathbb{R}^{d_{model} \\times d_{model}}","C_{OV} = W_U W_{OV} W_E \\in \\mathbb{R}^{V \\times V}","C_{QK} = W_E^T W_{QK} W_E \\in \\mathbb{R}^{V \\times V}"]},{id:"two-layer",title:"Two-Layer Models: Composition of Heads",titleKr:"2계층 모델: 헤드의 합성",content:`Two-layer attention-only transformers can implement much more complex algorithms using **compositions of attention heads**.

There are three types of composition:
- **Q-composition**: Second layer W_Q reads a subspace affected by first layer
- **K-composition**: Second layer W_K reads a subspace affected by first layer  
- **V-composition**: Second layer W_V reads a subspace affected by first layer

Q and K composition affect attention patterns, allowing much more complex attention. V-composition creates "virtual attention heads" — composed movement of information.

Composition strength can be measured by Frobenius norms:
||W_QK^{h2} · W_OV^{h1}||_F / (||W_QK^{h2}||_F · ||W_OV^{h1}||_F)`,contentKr:`2계층 어텐션 전용 트랜스포머는 **어텐션 헤드의 합성**을 통해 훨씬 더 복잡한 알고리즘을 구현할 수 있습니다.

세 가지 합성 유형이 있습니다:
- **Q-합성**: 레이어 2의 W_Q가 레이어 1이 영향을 준 부분 공간을 읽음
- **K-합성**: 레이어 2의 W_K가 레이어 1이 영향을 준 부분 공간을 읽음
- **V-합성**: 레이어 2의 W_V가 레이어 1이 영향을 준 부분 공간을 읽음

Q와 K 합성은 어텐션 패턴에 영향을 주어 훨씬 복잡한 어텐션을 가능하게 합니다. V-합성은 "가상 어텐션 헤드"를 만들어 정보 이동을 합성합니다.

합성 강도는 프로베니우스 노름으로 측정할 수 있습니다:

An induction head operates on sequences like [..., A, B, ..., A, ?] and predicts B, because it previously saw A followed by B.

The mechanism requires K-composition between two layers:
1. **Previous token head (Layer 0)**: Attends to the previous token, writing "token at position i-1" into the residual stream at position i
2. **Induction head (Layer 1)**: Uses K-composition to search for positions where the previous token matches the current query token

This capability represents a qualitative jump: from bigram lookup tables to actual algorithmic pattern matching.`,contentKr:`논문의 가장 중요한 발견: **인덕션 헤드**가 인컨텍스트 학습을 설명할 수 있습니다.

def softmax(x, axis=-1):
    x = x - np.max(x, axis=axis, keepdims=True)
    return np.exp(x) / np.sum(np.exp(x), axis=axis, keepdims=True)

# ===================================
# 어텐션 계산기 - 값을 바꿔보세요!
# ===================================

d_model = 8
d_head = 4
seq_len = 5

np.random.seed(42)

# 입력 시퀀스 (임베딩)
X = np.random.randn(seq_len, d_model)

# 가중치 (바꿔보세요!)
W_Q = np.random.randn(d_model, d_head)
W_K = np.random.randn(d_model, d_head)
W_V = np.random.randn(d_model, d_head)
W_O = np.random.randn(d_head, d_model)

# 어텐션 계산
Q = X @ W_Q
K = X @ W_K
V = X @ W_V

scale = np.sqrt(d_head)
scores = Q @ K.T / scale

# 인과적 마스크
mask = np.triu(np.full((seq_len, seq_len), -1e9), k=1)
attn = softmax(scores + mask)

# 출력
out = (attn @ V) @ W_O
result = X + out  # 잔차 연결

print(f"입력 X: {X.shape}")
print(f"어텐션 패턴:\\n{np.round(attn, 3)}")
print(f"출력 shape: {out.shape}")
print(f"잔차 연결 후: {result.shape}")

# 엔트로피 분석 (어텐션이 얼마나 집중적인가?)
entropy = -np.sum(attn * np.log(attn + 1e-9), axis=-1)
print(f"\\n어텐션 엔트로피 (낮을수록 집중적):")
for i, e in enumerate(entropy):
    bar = '█' * int((1 - e/np.log(seq_len)) * 20)
    print(f"  위치 {i}: {bar} {e:.3f}")

np.random.seed(0)

W_U = np.random.randn(d_model, vocab_size) * 0.3
W_Q = np.random.randn(d_model, d_head) * 0.3
W_K = np.random.randn(d_model, d_head) * 0.3
W_V = np.random.randn(d_model, d_head) * 0.3
W_O = np.random.randn(d_head, d_model) * 0.3

# QK 회로 행렬
W_QK = W_Q @ W_K.T
C_QK = W_E @ W_QK @ W_E.T

# OV 회로 행렬
W_OV = W_V @ W_O
C_OV = W_E @ W_OV @ W_U

print("=" * 50)

print(f"C_QK (확장) shape: {C_QK.shape}")

print("=" * 50)

print(f"C_OV (확장) shape: {C_OV.shape}")

print(f"\\n양의 고유값 비율: {pos_frac:.2f} → {'복사형!' if pos_frac > 0.5 else '비복사형'}")
print(f"상위 고유값: {np.round(real_eig[:3], 3)}")

print("\\n각 소스 토큰의 최대 영향:")

    x = x - np.max(x, axis=axis, keepdims=True)
    return np.exp(x) / np.sum(np.exp(x), axis=axis, keepdims=True)

# ===================================
# 인덕션 헤드 시뮬레이션
# 패턴: [..., A, B, ..., A] → B 예측
# ===================================

vocab = ['<BOS>', 'A', 'B', 'C', 'D']
V = len(vocab)
d_model = 8

# ---- 바꿔보세요! ----
# 반복 패턴이 있는 시퀀스
sequences_to_test = [
    [1, 2, 3, 1, 2],    # A B C A B → 다음은 C?
    [1, 2, 1, 2, 1],    # A B A B A → 다음은 B?
    [3, 4, 3, 4, 3],    # C D C D C → 다음은 D?
]
# --------------------

np.random.seed(42)
W_E = np.eye(V, d_model) + np.random.randn(V, d_model) * 0.05

for seq in sequences_to_test:
    seq_names = [vocab[t] for t in seq]
    seq_len = len(seq)
    
    print(f"\\n시퀀스: {' '.join(seq_names)}")
    
    X = W_E[seq]
    
    # 이전 토큰 헤드 (레이어 0)
    A0 = np.zeros((seq_len, seq_len))
    for i in range(seq_len):
        if i > 0:
            A0[i, i-1] = 0.9  # 이전 토큰에 90% 주목
            A0[i, i] = 0.1
        else:
            A0[i, i] = 1.0
    
    # 레이어 0 출력: 이전 토큰 정보를 현재 위치에 기록
    head0_out = A0 @ X  # 각 위치에 이전 위치의 임베딩 복사
    X1 = X + head0_out * 0.5
    
    # 인덕션 헤드 (레이어 1)
    A1 = np.zeros((seq_len, seq_len))
    for i in range(seq_len):
        for j in range(i+1):
            # 위치 j-1의 토큰이 현재 토큰 seq[i]와 같으면 높은 점수
            if j > 0 and seq[j-1] == seq[i]:
                A1[i, j] = 3.0
            else:
                A1[i, j] = 0.1
        # 소프트맥스 정규화
        if np.sum(A1[i, :i+1]) > 0:
            A1[i, :i+1] = softmax(A1[i, :i+1])
    
    # 마지막 토큰의 예측
    last_attn = A1[-1]
    print(f"  마지막 '{seq_names[-1]}'의 어텐션:")
    for j, (tok, w) in enumerate(zip(seq_names, last_attn)):
        if w > 0.05:
            next_tok = seq_names[j] if j < len(seq_names)-1 else "?"
            bar = '█' * int(w * 20)
            print(f"    → 위치{j}({tok}): {bar} {w:.3f} [다음={vocab[seq[j]] if j < len(seq)-1 else '?'}]")
    
    # 예측
    attended_pos = np.argmax(last_attn)
    if attended_pos < seq_len - 1:
        predicted = vocab[seq[attended_pos]]
    else:
        predicted = "?"
    print(f"  → 예측: '{predicted}'")

vocab = ['A', 'B', 'C', 'D', 'E']
V = len(vocab)
d_model = 4
d_head = 2

np.random.seed(7)

W_E = np.random.randn(V, d_model) * 0.4
W_U = np.random.randn(d_model, V) * 0.3
W_Q = np.random.randn(d_model, d_head) * 0.3
W_K = np.random.randn(d_model, d_head) * 0.3
W_V = np.random.randn(d_model, d_head) * 0.3
W_O = np.random.randn(d_head, d_model) * 0.3

# 시퀀스: A B C
seq = [0, 1, 2]
seq_len = len(seq)
X = W_E[seq]

# 어텐션 계산
mask = np.triu(np.full((seq_len, seq_len), -1e9), k=1)
Q = X @ W_Q
K = X @ W_K
V_ = X @ W_V
A = softmax(Q @ K.T / np.sqrt(d_head) + mask)

print("=" * 55)
print("경로별 로짓 기여 분석 (마지막 위치 'C')")
print("=" * 55)

# 마지막 토큰 C의 임베딩
x_last = X[-1]

# 경로 1: 직접 경로 (바이그램)
direct = x_last @ W_U
print(f"\\n경로 1 (직접/바이그램):")
print(f"  로짓: {np.round(direct, 3)}")
print(f"  최대: '{vocab[np.argmax(direct)]}' = {np.max(direct):.3f}")

# 경로 2: 어텐션 헤드 기여
W_OV = W_V @ W_O
attn_vals = (A[-1] @ X @ W_V) @ W_O  # 어텐션 출력
attn_logits = attn_vals @ W_U
print(f"\\n경로 2 (어텐션 헤드):")
print(f"  어텐션 가중치: A={np.round(A[-1], 3)}")
print(f"  로짓: {np.round(attn_logits, 3)}")
print(f"  최대: '{vocab[np.argmax(attn_logits)]}' = {np.max(attn_logits):.3f}")

# 개별 소스 토큰별 기여
print(f"\\n  소스 토큰별 기여:")
for i, (tok_id, weight) in enumerate(zip(seq, A[-1])):
    contrib = weight * (X[i] @ W_V @ W_O @ W_U)
    print(f"    '{vocab[tok_id]}' (w={weight:.3f}): "
          f"최대='{vocab[np.argmax(contrib)]}' ({np.max(contrib):+.3f})")

# 최종 합계
total = direct + attn_logits
total_probs = softmax(total)
print(f"\\n최종 예측 (경로 합계):")
for i, (tok, p) in enumerate(zip(vocab, total_probs)):
    bar = '█' * int(p * 30)
    marker = ' ← 최고!' if i == np.argmax(total_probs) else ''
    print(f"  {tok}: {bar} {p:.4f}{marker}")

def count_params(V, d, L, H, d_ff, tie=True, swiglu=False):
    embed = V * d
    pos = 2048 * d
    attn = 4 * d * d * L
    mlp = (3 if swiglu else 2) * d * d_ff * L
    ln = 4 * d * L + 2 * d
    unembed = 0 if tie else V * d
    total = embed + pos + attn + mlp + ln + unembed
    return total, {'embed':embed,'attn':attn,'mlp':mlp,'ln':ln}

models = [
    ("GPT-2 S",   50257, 768,  12, 12, 3072,  True,  False),
    ("GPT-2 XL",  50257, 1600, 48, 25, 6400,  True,  False),
    ("LLaMA 7B",  32000, 4096, 32, 32, 11008, False, True),
    ("LLaMA 70B", 32000, 8192, 80, 64, 28672, False, True),
]

print(f"{'Model':>12} {'Total':>10} {'Attn%':>6} {'MLP%':>6}")
print("-" * 40)
for name, V, d, L, H, ff, tie, swi in models:
    total, parts = count_params(V, d, L, H, ff, tie, swi)
    print(f"  {name:>10} {total/1e9:>7.2f}B "

for name, V, d, L, H, ff, tie, swi in models:

# ===================================
# SVD와 고유값 분석
# ===================================

np.random.seed(0)

d_model = 8
d_head = 4
vocab_size = 6

W_E = np.random.randn(vocab_size, d_model) * 0.5
W_U = np.random.randn(d_model, vocab_size) * 0.3
W_Q = np.random.randn(d_model, d_head) * 0.3
W_K = np.random.randn(d_model, d_head) * 0.3
W_V = np.random.randn(d_model, d_head) * 0.3
W_O = np.random.randn(d_head, d_model) * 0.3

# ---- SVD 분석 ----
print("=" * 50)
print("특이값 분해 (SVD) 분석")
print("=" * 50)

matrices = {
    'W_QK = W_Q @ W_K^T': W_Q @ W_K.T,
    'W_OV = W_V @ W_O': W_V @ W_O,
    'W_E': W_E,
    'W_U': W_U.T,
}

for name, M in matrices.items():
    U, S, Vt = np.linalg.svd(M)
    rank = np.sum(S > 0.01)
    print(f"\\n{name}:")
    print(f"  shape: {M.shape}")
    print(f"  특이값 (상위 5개): {np.round(S[:5], 3)}")
    print(f"  실효 랭크: {rank}")
    
    # 특이값 시각화
    max_s = S[0] if S[0] > 0 else 1
    bar_row = ""
    for s in S[:min(8, len(S))]:
        length = int(s / max_s * 15)
        bar_row += '█' * length + '░' * (15 - length) + " "
    print(f"  시각화: {bar_row}")

# ---- 고유값 분석 (복사 감지) ----
print("\\n" + "=" * 50)
print("고유값 분석 (복사 동작 감지)")
print("=" * 50)

# 복사형 OV 회로
W_V_copy = np.eye(d_model, d_head) * 0.9
W_O_copy = np.eye(d_head, d_model) * 0.9
W_OV_copy = W_V_copy @ W_O_copy

# 확장 OV 회로
C_OV_normal = W_E @ (W_V @ W_O) @ W_U
C_OV_copy = W_E @ W_OV_copy @ W_U

for name, C in [("일반 OV", C_OV_normal), ("복사형 OV", C_OV_copy)]:
    eigs = np.linalg.eigvals(C)
    real_eigs = np.sort(np.real(eigs))[::-1]
    pos_frac = np.sum(real_eigs > 0) / len(real_eigs)
    trace = np.trace(C)
    
    print(f"\\n{name}:")
    print(f"  고유값 (실수부, 상위): {np.round(real_eigs[:4], 3)}")
    print(f"  양의 고유값 비율: {pos_frac:.2f}")
    print(f"  대각합(Trace): {trace:.3f}")
    print(f"  판정: {'복사형' if pos_frac > 0.6 else '비복사형'}")

q1",question:"0-레이어 트랜스포머는 어떤 유형의 통계를 모델링합니까?",options:["트라이그램","바이그램","유니그램","스킵-트라이그램"],correct:1,explanation:"0-레이어 트랜스포머는 바이그램 통계를 모델링합니다. W_U·W_E 행렬이 직접 바이그램 테이블을 나타냅니다.",difficulty:"easy"},{id:"q2",question:"QK 회로(W_Q^T·W_K)의 최대 랭크는?",options:["d_model","d_head","vocab_size","d_model × d_head"],correct:1,explanation:"W_QK = W_Q·W_K^T는 d_model×d_model 행렬이지만, W_Q는 d_model×d_head이므로 랭크는 최대 d_head입니다.",difficulty:"medium"},{id:"q3",question:"인덕션 헤드는 최소 몇 개의 어텐션 레이어가 필요합니까?",options:["0개","1개","2개","4개"],correct:2,explanation:"인덕션 헤드는 K-합성이 필요하므로 최소 2개의 어텐션 레이어가 필요합니다. 레이어 0의 이전 토큰 헤드와 레이어 1의 인덕션 헤드가 필요합니다.",difficulty:"easy"},{id:"q4",question:"잔차 스트림의 핵심 특성은?",options:["각 레이어가 이전 레이어를 덮어씁니다","비선형 활성화 함수가 적용됩니다","순수하게 선형적(덧셈 기반)입니다","위치 정보를 저장합니다"],correct:2,explanation:'잔차 스트림은 순수하게 선형적(additive)입니다. 각 레이어가 결과를 더하며, 비선형성이 없어 "특권 기저"가 없습니다.',difficulty:"medium"},{id:"q5",question:"OV 회로(W_O·W_V)가 복사 동작을 하는지 감지하는 방법은?",options:["트레이스(대각합)가 0인지 확인","양의 고유값 비율이 높은지 확인","프로베니우스 노름이 큰지 확인","랭크가 낮은지 확인"],correct:1,explanation:"복사 행렬은 양의 고유값이 많습니다. 논문에서는 12개 헤드 중 10개가 유의미한 양의 고유값을 가져 복사형임을 발견했습니다.",difficulty:"hard"},{id:"q6",question:"1-레이어 어텐션 트랜스포머는 어떤 모델의 앙상블입니까?",options:["바이그램과 유니그램","바이그램과 스킵-트라이그램","트라이그램과 스킵-트라이그램","유니그램과 트라이그램"],correct:1,explanation:"1-레이어 어텐션 트랜스포머는 바이그램 모델(직접 경로)과 스킵-트라이그램 모델(어텐션 경로)의 앙상블입니다.",difficulty:"medium"},{id:"q7",question:"가상 가중치(Virtual Weights)는 무엇을 나타냅니까?",options:["훈련되지 않은 초기 가중치","두 레이어를 잔차 스트림을 통해 직접 연결하는 암묵적 행렬","MLP 레이어의 가중치","어텐션 패턴 가중치"],correct:1,explanation:"가상 가중치는 레이어 l1의 출력 가중치와 레이어 l2의 입력 가중치의 곱(W_I^{l2}·W_O^{l1})으로, 잔차 스트림을 통해 두 레이어를 직접 연결하는 암묵적 행렬입니다.",difficulty:"hard"},{id:"q8",question:"V-합성(V-composition)이 생성하는 것은?",options:["더 복잡한 어텐션 패턴","가상 어텐션 헤드","더 깊은 MLP 레이어","위치 인코딩"],correct:1,explanation:"V-합성은 가상 어텐션 헤드(Virtual Attention Head)를 만듭니다. 레이어 1의 OV 회로가 레이어 0의 OV 회로 출력을 처리하여 두 헤드가 하나처럼 작동합니다.",difficulty:"hard"},{id:"q9",question:"경로 확장 기법의 핵심 아이디어는?",options:["그래디언트를 역방향으로 추적","트랜스포머 출력을 해석 가능한 경로의 합으로 분해","뉴런을 개별적으로 분석","어텐션 패턴을 클러스터링"],correct:1,explanation:'경로 확장은 트랜스포머 출력을 "경로"(데이터가 모델을 통과하는 각 방법)의 합으로 분해합니다. 어텐션 패턴이 고정되면 각 경로는 선형입니다.',difficulty:"medium"},{id:"q10",question:'잔차 스트림에 "특권 기저(privileged basis)"가 없다는 것은 무슨 의미입니까?',options:["잔차 스트림은 항상 0입니다","모든 레이어가 같은 기저를 사용합니다","임의의 직교 변환을 가해도 모델 동작이 불변입니다","잔차 스트림은 비선형 변환이 없습니다"],correct:2,explanation:"특권 기저가 없다는 것은 잔차 스트림의 모든 상호작용 행렬을 같은 임의 직교 행렬 Q로 변환해도 모델의 동작이 전혀 바뀌지 않는다는 의미입니다.",difficulty:"hard"},{id:"q11",question:"코사인 유사도(Cosine Similarity)는 무엇을 측정합니까?",options:["두 벡터의 길이의 비율","두 벡터 사이의 각도를 기반으로 한 유사성","두 벡터의 원소별 차이","두 벡터의 크로네커 곱"],correct:1,explanation:"코사인 유사도 = v·w / (||v|| ||w||) = cos(θ). 두 벡터 사이의 각도를 기반으로 유사성을 측정합니다. 어텐션 점수 계산의 기반입니다.",difficulty:"easy"},{id:"q12",question:"SVD (특이값 분해)에서 A = UΣV^T일 때, Σ의 대각 원소는?",options:["고유값","특이값 (항상 0 이상)","코사인 유사도","프로베니우스 노름"],correct:1,explanation:'SVD의 Σ는 특이값을 대각에 가지며, 이들은 항상 0 이상입니다. 특이값은 각 방향의 "중요도"를 나타내며, 고유값과는 다릅니다.',difficulty:"medium"},{id:"q13",question:"RoPE (Rotary Position Embedding)의 핵심 특성은?",options:["절대 위치만 인코딩","학습 가능한 위치 벡터 사용","어텐션 점수가 상대 위치(m-n)에만 의존","어텐션 점수에 편향 추가"],correct:2,explanation:"RoPE는 Q, K 벡터에 위치 기반 회전을 적용하여 q_m · k_n = f(q, k, m-n)을 만족시킵니다. 즉 어텐션 점수가 절대 위치가 아닌 상대 위치에만 의존합니다.",difficulty:"hard"},{id:"q14",question:"KV 캐시를 사용하면 자기회귀 생성의 총 복잡도가 어떻게 변합니까?",options:["O(n) → O(1)","O(n³·d) → O(n²·d)","O(n²) → O(n)","변하지 않음"],correct:1,explanation:"KV 캐시 없이 전체 시퀀스를 매번 재계산하면 O(n³·d)이지만, 이전 K, V를 캐시하면 새 토큰당 O(n·d)만 필요하여 총 O(n²·d)로 개선됩니다.",difficulty:"medium"},{id:"q15",question:"Xavier 초기화에서 가중치의 분산은?",options:["1/fan_in","2/(fan_in + fan_out)","1","0.02"],correct:1,explanation:"Xavier (Glorot) 초기화: W ~ N(0, 2/(fan_in + fan_out)). 입출력 차원의 합으로 나눠 순전파와 역전파 모두에서 분산을 보존합니다.",difficulty:"medium"},{id:"q16",question:"FlashAttention이 속도를 향상시키는 핵심 기법은?",options:["어텐션 패턴을 희소하게 근사","타일링으로 SRAM에서 연산, 중간 결과를 HBM에 저장하지 않음","어텐션 레이어를 제거","GPU 코어 수를 늘림"],correct:1,explanation:"FlashAttention은 Q, K, V를 작은 블록(타일)으로 나눠 빠른 SRAM에서 모든 연산을 수행하고, 큰 중간 행렬(S, P)을 느린 HBM에 저장하지 않습니다.",difficulty:"hard"},{id:"q17",question:"SwiGLU 활성화 함수의 구조는?",options:["max(0, x)","(SiLU(xW₁) ⊙ xW₂)W₃","x · sigmoid(x)","x · tanh(x)"],correct:1,explanation:"SwiGLU = (SiLU(xW₁) ⊙ xW₂)W₃. 게이트(W₁)와 값(W₂)을 분리하여 정보 흐름을 선택적으로 제어합니다. LLaMA, PaLM 등 최신 모델의 표준.",difficulty:"hard"},{id:"q18",question:"Chinchilla 스케일링 법칙에 따르면 최적 훈련은?",options:["모델을 최대한 크게 만들기","데이터를 최대한 많이 사용하기","모델 크기(N)와 데이터(D)를 같은 비율로 스케일 (D ≈ 20N)","학습률을 최대화하기"],correct:2,explanation:"Chinchilla 법칙: 고정된 계산 예산에서 N과 D를 같은 비율로 스케일 (D ≈ 20N). GPT-3는 모델이 너무 크고 데이터가 부족했습니다.",difficulty:"medium"},{id:"q19",question:"크로네커 곱 A ⊗ B에서 A가 m×n, B가 p×q이면 결과의 크기는?",options:["m×n","mp × nq","(m+p) × (n+q)","mn × pq"],correct:1,explanation:"크로네커 곱 A ⊗ B는 mp × nq 크기의 행렬을 만듭니다. A의 각 원소 aij를 aij·B로 대체한 블록 행렬입니다.",difficulty:"hard"},{id:"q20",question:"BF16 (Brain Float)이 FP16보다 딥러닝에 유리한 이유는?",options:["정밀도가 더 높기 때문","메모리를 더 적게 사용하기 때문","FP32와 동일한 지수 범위로 오버플로우/언더플로우 방지","연산 속도가 더 빠르기 때문"],correct:2,explanation:"BF16은 8비트 지수(FP32와 동일)로 ~10^±38 범위를 가져 그래디언트 오버플로우/언더플로우를 방지합니다. FP16은 5비트 지수로 범위가 좁아 Loss Scaling이 필요합니다.",difficulty:"medium"}];function i0(){const[d,b]=M.useState(0),[v,c]=M.useState(null),[h,E]=M.useState(!1),[K,Z]=M.useState(0),[A,m]=M.useState(!1),[q,L]=M.useState("all"),k=q==="all"?$f:$f.filter(D=>D.difficulty===q),Q=k[d],$=D=>{h||(c(D),E(!0),D===Q.correct&&Z(re=>re+1))},oe=()=>{d<k.length-1?(b(D=>D+1),c(null),E(!1)):m(!0)},ye=()=>{b(0),c(null),E(!1),Z(0),m(!1)};if(A){const D=Math.round(K/k.length*100);return r.jsxs("div",{className:"text-center space-y-5 py-12",children:[r.jsxs("div",{className:"text-5xl font-bold tabular-nums",style:{color:"var(--text-primary)"},children:[D,"%"]}),r.jsxs("div",{className:"text-sm",style:{color:"var(--text-secondary)"},children:[K," of ",k.length," correct"]}),r.jsx("p",{className:"text-sm max-w-sm mx-auto leading-relaxed",style:{color:"var(--text-muted)"},children:D>=80?"Excellent understanding of transformer circuits.":D>=60?"Good progress. Review the
